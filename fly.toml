# https://fly.io — après installation de la CLI : fly launch --dockerfile Dockerfile
# Réglez internal_port sur le même port que ${PORT} dans le conteneur (ici 8000).

app = "jungle-ml-web"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
